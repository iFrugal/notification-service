name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan every Monday 04:17 UTC (mid-week scans are cheaper than
    # Monday-morning queues, and the off-the-hour reduces thundering-herd
    # cost on the GitHub-hosted runner fleet).
    - cron: '17 4 * * 1'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [java-kotlin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality catches more than the default security-extended
          # and is worth the extra runtime for an SPI-shaped library.
          queries: security-and-quality

      - name: Build with Maven
        run: ./mvnw -B -ntp -U -DskipTests clean package

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}
