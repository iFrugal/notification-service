name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel superseded runs on the same ref so pushes while CI is running
# don't pile up in the queue.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build & verify (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Primary LTS + next LTS so regressions on 29 are caught early.
        # Adjust this list once a new LTS becomes the project target.
        java: ['25']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Validate Maven reactor
        run: ./mvnw -B -ntp validate

      - name: Build & verify
        # -Dgpg.skip=true: maven-gpg-plugin is inherited from ifrugal-parent
        # and binds to verify. CI has no GPG key configured; signing is a
        # release-time concern, not a CI concern.
        run: ./mvnw -B -ntp -U -Dgpg.skip=true clean verify

      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          if-no-files-found: ignore
          retention-days: 7

  dependency-analyze:
    name: Dependency hygiene
    runs-on: ubuntu-latest
    needs: build
    # Don't block PR completion on this — it's a hygiene check, not a gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '25'
          cache: maven

      - name: Analyze declared vs. used dependencies
        run: ./mvnw -B -ntp -DskipTests -Dgpg.skip=true dependency:analyze
