# Configures GitHub's auto-generated release notes.
# The release workflow calls softprops/action-gh-release with
# generate_release_notes: true, which reads this file.
changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies-internal
    authors:
      - dependabot
      - github-actions

  categories:
    - title: Breaking changes
      labels: [breaking]
    - title: Features
      labels: [feature, enhancement]
    - title: Bug fixes
      labels: [bug, fix]
    - title: Refactoring & internals
      labels: [refactor, internal]
    - title: Documentation
      labels: [docs]
    - title: Build, CI, and release plumbing
      labels: [build, ci, release]
    - title: Dependency updates
      labels: [dependencies]
    - title: Other changes
      labels: ["*"]
