# SonarCloud configuration for iFrugal/notification-service.
# Mirrors the pattern used by iFrugal/all-about-persistence so the
# SonarCloud project pages of the two repos look and behave identically.
#
# Coverage data is read from JaCoCo XML reports written by the
# jacoco-maven-plugin (configured at version 0.8.14 in the parent POM,
# which produces target/site/jacoco/jacoco.xml in every module).
# SonarScanner picks those up automatically when invoked from a build
# that has just run `verify`.

# Root project
sonar.projectKey=iFrugal_notification-service
sonar.organization=ifrugal
sonar.host.url=https://sonarcloud.io

# Multi-module declaration. Sub-modules of notification-channels are
# auto-discovered by SonarScanner via the Maven aggregator POM, so we
# only list the top-level Maven modules here — same shape as
# all-about-persistence.
sonar.modules=notification-api,notification-core,notification-channels,notification-audit,notification-kafka,notification-rest,notification-spring-boot-starter,notification-server

# Module base directories
notification-api.sonar.projectBaseDir=notification-api
notification-core.sonar.projectBaseDir=notification-core
notification-channels.sonar.projectBaseDir=notification-channels
notification-audit.sonar.projectBaseDir=notification-audit
notification-kafka.sonar.projectBaseDir=notification-kafka
notification-rest.sonar.projectBaseDir=notification-rest
notification-spring-boot-starter.sonar.projectBaseDir=notification-spring-boot-starter
notification-server.sonar.projectBaseDir=notification-server
